<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SpringAI Bootcamp Chatbot</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --panel-2: #273449;
            --accent: #6366f1;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --user: #4f46e5;
            --assistant: #334155;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
        }
        aside {
            width: 280px;
            background: var(--panel);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #0b1120;
        }
        aside header {
            padding: 16px;
            font-weight: 600;
            font-size: 18px;
            border-bottom: 1px solid #0b1120;
        }
        #new-chat,
        #llmChatButton {
            margin: 12px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        #new-chat:hover,
        #llmChatButton:hover {
            opacity: 0.9;
        }

        #new-chat:disabled,
        #llmChatButton:disabled {
            opacity: 0.5;
            cursor: default;
        }
        #chat-list { flex: 1; overflow-y: auto; padding: 0 8px; }
        .chat-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .chat-item:hover { background: var(--panel-2); }
        .chat-item.active { background: var(--panel-2); }
        .chat-item .title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .chat-item .count { color: var(--muted); font-size: 12px; }
        .chat-item .del {
            border: none;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 14px;
        }
        .chat-item .del:hover { color: #f87171; }
        main { flex: 1; display: flex; flex-direction: column; }
        main header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--panel);
            font-weight: 600;
        }
        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .msg { max-width: 70%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; }
        .msg.user { align-self: flex-end; background: var(--user); }
        .msg.assistant { align-self: flex-start; background: var(--assistant); }
        .msg .role { font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
        .msg.llm-a {
            align-self: flex-start;
            background: var(--assistant);
        }

        .msg.llm-b {
            align-self: flex-end;
            background: var(--assistant);
        }
        .empty { color: var(--muted); margin: auto; text-align: center; }
        form {
            display: flex;
            gap: 10px;
            padding: 16px 20px;
            border-top: 1px solid var(--panel);
        }
        #input {
            flex: 1;
            resize: none;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--panel-2);
            background: var(--panel);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
        }
        #send {
            padding: 0 20px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            cursor: pointer;
        }
        #send:disabled { opacity: 0.5; cursor: default; }
        #error { color: #f87171; padding: 0 20px 10px; min-height: 18px; font-size: 13px; }
        #diagram-btn {
            padding: 0 16px;
            border: none;
            border-radius: 8px;
            background: var(--panel-2);
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }

        #diagram-btn:hover {
            background: var(--accent);
        }

        #diagram-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }
        #diagram {
            height: 300px;
            margin: 10px 20px;
            padding: 20px;
            background: var(--panel);
            border-radius: 12px;
            overflow: auto;
        }

        #diagram svg {
            max-width: 100%;
        }
        .msg.assistant:has(svg) {
            max-width: 95%;
            width: 95%;
        }

        .msg.assistant svg {
            width: 100%;
            height: auto;
            min-height: 500px;
        }

        .msg.assistant:has(svg) div {
            overflow-x: auto;
        }
    </style>
</head>
<body>
<aside>
    <header>💬 Chats</header>
    <button id="new-chat">+ New chat</button>
    <button id="llmChatButton">
        🤖 LLM vs LLM
    </button>
    <div id="chat-list"></div>
</aside>
<main>
    <header id="chat-title">Select or start a chat</header>
    <div id="chatMessages">
        <div class="empty">No conversation selected.</div>
    </div>

    <div id="error"></div>
    <form id="composer">

    <textarea
            id="input"
            rows="2"
            placeholder="Type a chatMessage and press Enter..."
            disabled>
    </textarea>

        <button id="llm-next-btn" disabled>
            Generate next response
        </button>

        <button id="diagram-btn" type="button" disabled>
            Diagram
        </button>

        <button
                id="send"
                type="submit"
                disabled>
            Send
        </button>

    </form>
</main>
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script src="/app.js?v=chatMessages"></script>
</body>
</html>
